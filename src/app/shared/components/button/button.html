<button
  [type]="type()"
  [disabled]="isDisabled()"
  [attr.aria-busy]="loading() ? 'true' : null"
  [class]="classes()"
>
  @if (loading()) {
    <svg
      class="animate-spin w-4 h-4 me-2 shrink-0"
      aria-hidden="true"
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
    >
      <circle
        class="opacity-25"
        cx="12"
        cy="12"
        r="10"
        stroke="currentColor"
        stroke-width="4"
      ></circle>
      <path
        class="opacity-75"
        fill="currentColor"
        d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"
      ></path>
    </svg>
  } @else {
    <ng-content select="[icon]"></ng-content>
  }
  <ng-content></ng-content>
</button>
